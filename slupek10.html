<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Odbiornika 10</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; background: #222; color: white; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #kolo { width: 180px; height: 180px; border-radius: 50%; margin: 20px auto; background-color: #555; transition: background-color 0.3s ease; }
        #tekst { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        
        #btn-permission { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-color: rgba(41, 128, 185, 0.95); color: white; 
            z-index: 9999; border: none; font-size: 28px; font-weight: bold; 
            cursor: pointer; padding: 40px; text-align: center;
        }

        /* Styl nowego przycisku wymuszania zmiany stanu na pilocie */
        #btn-zwolnij {
            margin-top: 25px;
            padding: 18px 36px;
            font-size: 22px;
            font-weight: bold;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        #btn-zwolnij:active {
            background-color: #d35400;
        }

        #debug {
            margin-top: 15px;
            font-family: monospace;
            font-size: 14px;
            color: #ff9f43;
            max-width: 90%;
        }
    </style>
</head>
<body>

    <button id="btn-permission" onclick="odblokujSygnalizacje()">
        DOTKNIJ EKRANU TEL. SŁUPKA<br><br>
        Aby odblokować sygnały dźwiękowe i wibracje
    </button>

    <h2 id="naglowek">Status Słupka</h2>
    <div id="kolo"></div>
    <div id="tekst">Oczekiwanie na aktywację urządzenia...</div>
    
    <button id="btn-zwolnij" onclick="zwolnijSlupek()">ZWOLNIJ SŁUPEK</button>
    
    <div id="debug">Status: Zablokowany interfejs</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // Dodano metodę 'set' do operacji zapisu zwrotnego
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const urlParams = new URLSearchParams(window.location.search);
        const idSlupka = urlParams.get('id') || 'A1'; 

        document.getElementById('naglowek').innerText = "Status Słupka " + idSlupka;
        const logoTekst = document.getElementById('tekst');
        const kolo = document.getElementById('kolo');
        const btnPermission = document.getElementById('btn-permission');
        const debugElement = document.getElementById('debug');

        const firebaseConfig = {
            apiKey: "AIzaSyDaT2Eqg5431xX6Q0VwOoaCeyVofxhYw74",
            authDomain: "sterowanie-slupkiem10.firebaseapp.com",
            databaseURL: "https://sterowanie-slupkiem10-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sterowanie-slupkiem10",
            storageBucket: "sterowanie-slupkiem10.firebasestorage.app",
            messagingSenderId: "813653953691",
            appId: "1:813653953691:web:3c5e02fb488f11160bca3e"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        let audioCtx = null;
        let interfejsOdblokowany = false;
        let poprzedniStan = null;

        window.odblokujSygnalizacje = function() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                interfejsOdblokowany = true;
                btnPermission.style.display = 'none';
                logoTekst.innerText = "Połączono. Oczekiwanie na dane z pilota...";
                debugElement.innerText = "Status: Aktywny (Audio + Vibrate odblokowane)";
                
                if (navigator.vibrate) navigator.vibrate(100);
                
                uruchomNasluchiwanieBazy();
            } catch (e) {
                debugElement.innerText = "Błąd inicjalizacji AudioContext: " + e.message;
            }
        }

        // Funkcja wysyłająca stan wymuszonego zwolnienia do instancji Firebase
        window.zwolnijSlupek = function() {
            if (!database) return;
            const stanRef = ref(database, 'slupki/' + idSlupka);
            
            // Zapis wartości 0 (Słupek opuszczony/zwolniony) do bazy danych
            set(stanRef, 0)
            .then(() => {
                debugElement.innerText = "Wysłano polecenie ZWOLNIJ (stan: 0) do pilota.";
            })
            .catch(err => {
                debugElement.innerText = "Błąd transmisji danych: " + err.message;
            });
        }

        function generujDzwiek(czestotliwosc, czasTrwaniaMs) {
            if (!audioCtx || !interfejsOdblokowany) return;
            try {
                const oscylator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscylator.type = 'sine';
                oscylator.frequency.setValueAtTime(czestotliwosc, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + (czasTrwaniaMs / 1000));
                oscylator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscylator.start();
                oscylator.stop(audioCtx.currentTime + (czasTrwaniaMs / 1000));
            } catch (err) {
                console.log("Błąd generowania dźwięku:", err);
            }
        }

        function wykonajSygnalizacje(stan) {
            if (stan === 1) {
                generujDzwiek(880, 150);
                setTimeout(() => generujDzwiek(880, 150), 200);
                setTimeout(() => generujDzwiek(1200, 300), 400);
                if (navigator.vibrate) {
                    navigator.vibrate([200, 100, 200, 100, 400]);
                }
                debugElement.innerText = "Sygnał: Słupek podniesiony (Wibracja + Audio)";
            } else if (stan === 0) {
                generujDzwiek(440, 200);
                setTimeout(() => generujDzwiek(330, 300), 250);
                if (navigator.vibrate) {
                    navigator.vibrate(500);
                }
                debugElement.innerText = "Sygnał: Słupek opuszczony (Wibracja + Audio)";
            }
        }

        function uruchomNasluchiwanieBazy() {
            const stanRef = ref(database, 'slupki/' + idSlupka);
            onValue(stanRef, (snapshot) => {
                const data = snapshot.val();
                
                if (data === 1) {
                    kolo.style.backgroundColor = '#e74c3c'; 
                    logoTekst.innerText = "SŁUPEK PODNIESIONY";
                    if (poprzedniStan !== 1) {
                        wykonajSygnalizacje(1);
                        poprzedniStan = 1;
                    }
                } else if (data === 0) {
                    kolo.style.backgroundColor = '#2ecc71'; 
                    logoTekst.innerText = "SŁUPEK OPUSZCZONY";
                    if (poprzedniStan !== 0) {
                        wykonajSygnalizacje(0);
                        poprzedniStan = 0;
                    }
                } else {
                    kolo.style.backgroundColor = '#555';
                    logoTekst.innerText = "Brak danych (Uruchom pilota i nadaj stan)";
                    poprzedniStan = null;
                }
            });
        }
    </script>
</body>
</html>
