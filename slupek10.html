<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Odbiornika 10</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; background: #222; color: white; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #kolo { width: 150px; height: 150px; border-radius: 50%; margin: 20px auto; background-color: #555; transition: background-color 0.3s ease; }
        #tekst { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        
        #btn-permission { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-color: rgba(41, 128, 185, 0.95); color: white; 
            z-index: 9999; border: none; font-size: 28px; font-weight: bold; 
            cursor: pointer; padding: 40px; text-align: center;
        }

        /* Zmiana: Zwiększono wymiary podglądu strumienia wideo (obrazu z kamery) */
        #sprzetowy-strumien {
            width: 90%;
            max-width: 480px;
            height: auto;
            aspect-ratio: 4 / 3;
            background: #000;
            border: 2px solid #555;
            border-radius: 8px;
            margin-top: 10px;
        }

        #debug {
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            color: #ff9f43;
            max-width: 90%;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <button id="btn-permission" onclick="inicjalizujAparat()">
        DOTKNIJ EKRANU TEL. SŁUPKA<br><br>
        Aby aktywować koło, napisy i latarkę
    </button>

    <h2 id="naglowek">Status Słupka</h2>
    <div id="kolo"></div>
    <div id="tekst">Oczekiwanie na aktywację urządzenia...</div>

    <video id="sprzetowy-strumien" autoplay playsinline muted></video>
    
    <div id="debug">Status systemu: Brak inicjalizacji</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const urlParams = new URLSearchParams(window.location.search);
        const idSlupka = urlParams.get('id') || 'A1'; 

        document.getElementById('naglowek').innerText = "Status Słupka " + idSlupka;
        const logoTekst = document.getElementById('tekst');
        const kolo = document.getElementById('kolo');
        const btnPermission = document.getElementById('btn-permission');
        const videoElement = document.getElementById('sprzetowy-strumien');
        const debugElement = document.getElementById('debug');

        const firebaseConfig = {
            apiKey: "AIzaSyDaT2Eqg5431xX6Q0VwOoaCeyVofxhYw74",
            authDomain: "sterowanie-slupkiem10.firebaseapp.com",
            databaseURL: "https://sterowanie-slupkiem10-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sterowanie-slupkiem10",
            storageBucket: "sterowanie-slupkiem10.firebasestorage.app",
            messagingSenderId: "813653953691",
            appId: "1:813653953691:web:3c5e02fb488f11160bca3e"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        let streamWideo = null;
        let trackWideo = null;

        window.inicjalizujAparat = async function() {
            debugElement.innerText = "Inicjalizacja kamery...";
            try {
                streamWideo = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment"
                    }
                });
                
                videoElement.srcObject = streamWideo;
                trackWideo = streamWideo.getVideoTracks()[0];
                
                setTimeout(() => {
                    try {
                        const capabilities = trackWideo.getCapabilities();
                        if (capabilities.torch) {
                            debugElement.innerText = "Aparat podłączony. Wykryto moduł latarki.";
                        } else {
                            debugElement.innerText = "Aparat podłączony, ale przeglądarka NIE wykryła latarki w tym aparacie.";
                        }
                    } catch (e) {
                        debugElement.innerText = "Aparat podłączony. Brak możliwości odczytu specyfikacji (getCapabilities).";
                    }
                }, 1000);

                btnPermission.style.display = 'none';
                logoTekst.innerText = "Połączono. Oczekiwanie na dane z pilota...";
                
                uruchomNasluchiwanieBazy();
            } catch (error) {
                debugElement.innerText = "BŁĄD krytyczny getUserMedia: " + error.message;
                logoTekst.innerText = "Błąd inicjalizacji sprzętu.";
            }
        }

        function uruchomNasluchiwanieBazy() {
            const stanRef = ref(database, 'slupki/' + idSlupka);

            onValue(stanRef, (snapshot) => {
                const data = snapshot.val();
                if (data === 1) {
                    kolo.style.backgroundColor = '#e74c3c'; 
                    logoTekst.innerText = "SŁUPEK PODNIESIONY";
                    wysterujLatarke(true);
                } else if (data === 0) {
                    kolo.style.backgroundColor = '#2ecc71'; 
                    logoTekst.innerText = "SŁUPEK OPUSZCZONY";
                    wysterujLatarke(false);
                } else {
                    kolo.style.backgroundColor = '#555';
                    logoTekst.innerText = "Brak danych (Uruchom pilota i nadaj stan)";
                    wysterujLatarke(false);
                }
            });
        }

        function wysterujLatarke(stan) {
            if (trackWideo && typeof trackWideo.applyConstraints === 'function') {
                trackWideo.applyConstraints({
                    advanced: [{ torch: stan }]
                })
                .then(() => {
                    debugElement.innerText = "Dioda LED zsynchronizowana ze stanem: " + stan;
                })
                .catch(err => {
                    debugElement.innerText = "Błąd applyConstraints: " + err.message;
                });
            } else {
                debugElement.innerText = "Błąd wykonawczy: trackWideo nieaktywny lub brak obsługi applyConstraints.";
            }
        }
    </script>
</body>
</html>
